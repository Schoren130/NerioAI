<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nerio Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h1>Willkommen, {{ username }}</h1>
      <button id="logout-btn" onclick="logout()" class="logout-button">Logout</button>
    </div>

    <div id="chatbox" class="chatbox"></div>

    <div class="input-area">
      <input id="user_input" type="text" placeholder="Schreibe eine Nachricht..." onkeydown="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Senden</button>
    </div>
  </div>

  <script>
  const input = document.getElementById("user_input");
  input.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      event.preventDefault();
      sendMessage();
    }
  });

  async function sendMessage() {
    const chatbox = document.getElementById("chatbox");
    const userMessage = input.value.trim();
    if (!userMessage) return;

    chatbox.innerHTML += `
      <div class="message user">
        <img src="/static/user.png" class="avatar">
        <div class="bubble">
          <span>Du:</span> ${userMessage}
        </div>
      </div>`;
    input.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;

    const response = await fetch("/nerio_chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage })
    });

    const data = await response.json();
    const responses = data.responses;
    const msgId = "nerio-" + Date.now();
    const responseText = responses.map(sentence => sentence.trim() + '.').join(' ');
    chatbox.innerHTML += `
      <div class="message bot" id="${msgId}">
        <img src="/static/nerio.png" class="avatar">
        <div class="bubble"><span>Nerio:</span><span id="${msgId}-text">${responseText}</span></div>
      </div>`;

    await playAudioSequentially(data.audio);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  async function playAudioSequentially(audioFiles) {
    for (const audioPath of audioFiles) {
        if (audioPath !== 0) {
            const audio = new Audio(audioPath);
            await new Promise((resolve) => {
                audio.onended = resolve;
                audio.play().catch(error => {
                    console.error("Audio konnte nicht abgespielt werden:", error);
                    resolve();
                });
            });
        }
    }
  }

  async function logout() {
    // Ruft Flask-Logout-Route auf
    const response = await fetch("/logout");
    if (response.redirected) {
      window.location.href = response.url; // Weiterleitung folgt
    } else {
      window.location.href = "/login"; // Fallback
    }
  }
  </script>
</body>
</html>
