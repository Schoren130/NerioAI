<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>E-Mail Einstellungen</title>
    <style>
        body {
            background-color: #222;
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
        }
        form {
            background: #333;
            padding: 20px;
            border-radius: 8px;
            width: 320px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>E-Mail Einstellungen</h2>
    <form method="POST">
        <input type="text" name="email" placeholder="E-Mail-Adresse" required><br>
        <input type="password" name="email_password" placeholder="E-Mail-Passwort" required><br>
        <input type="text" name="imap_server" placeholder="IMAP-Server (z. B. imap.gmail.com)" required><br>
        <input type="number" name="imap_port" placeholder="IMAP-Port" value="993" required><br>
        <input type="text" name="smtp_server" placeholder="SMTP-Server (z. B. smtp.gmail.com)" required><br>
        <input type="number" name="smtp_port" placeholder="SMTP-Port" value="465" required><br>
        <button type="submit">Registrierung abschließen</button>
    </form>
</body>
</html>
